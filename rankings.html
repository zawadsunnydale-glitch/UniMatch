<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Rankings — UniMatch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header" data-active="rankings"></div>

<main>
  <section>
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">Aggregated rankings</span>
        <h2>Compare parameters side by side</h2>
      </div>
      <div style="overflow-x:auto;">
        <table class="rank-table">
          <thead>
            <tr><th>#</th><th>University</th><th>Country</th><th>Tuition / yr</th></tr>
          </thead>
          <tbody id="rankTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="main.js"></script>
<script src="rankings.js"></script>
</body>
</html>
