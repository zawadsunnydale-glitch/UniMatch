<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Application Tools — UniMatch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header" data-active="tools"></div>

<main>
  <section style="padding-bottom:0;">
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">Free application tools</span>
        <h2>Everything you need to plan, match, and cost your degree</h2>
      </div>

      <div class="tool-tabs" id="toolTabs">
        <button class="tool-tab active" data-tab="search">AI Search</button>
        <button class="tool-tab" data-tab="quiz">Quick Match</button>
        <button class="tool-tab" data-tab="planner">Subject Planner</button>
        <button class="tool-tab" data-tab="eligibility">Eligibility</button>
        <button class="tool-tab" data-tab="career">Career Map</button>
      </div>

      <div class="tool-panel active" id="panel-search">
        <div class="search-input-wrap" style="max-width:720px;margin-bottom:34px;">
          <input type="text" class="search-input" id="toolSearchInput" placeholder="e.g. affordable mechanical engineering programs...">
          <button class="search-submit" id="toolSearchBtn">→</button>
        </div>
        <div class="career-grid" id="searchResultsGrid"></div>
      </div>

      <div class="tool-panel" id="panel-quiz">
        <div class="panel-grid">
          <div>
            <div class="field-block">
              <span class="field-label">Target Field</span>
              <select class="input-line" id="quizFieldSelect"></select>
            </div>
            <div class="field-block">
              <span class="field-label">Maximum Budget / Year</span>
              <input type="range" id="quizBudgetSlider" style="width:100%;">
            </div>
          </div>
          <div>
            <div id="quizResultsGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="main.js"></script>
<script src="tools.js"></script>
</body>
</html>
