<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Your Admissions — UniMatch</title>
<meta name="description" content="Choose your path — apply to universities in Bangladesh or abroad.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header" data-active="admissions"></div>

<main>
  <section style="padding-bottom:0;">
    <div class="wrap">
      <div class="section-head center reveal">
        <span class="eyebrow" style="justify-content:center;">Admissions</span>
        <h2>Start your admissions process</h2>
        <p>Most students run both tracks in parallel. Toggle between them below.</p>
      </div>

      <div class="path-grid reveal">
        <button class="path-card bd btn-shine" id="btnBd" style="cursor:pointer;" >
          <h3>🎓 Apply to Universities in Bangladesh</h3>
          <p>Public & private admission tests, IBA prep timelines, and local tuition.</p>
        </button>
        <button class="path-card abroad btn-shine" id="btnAbroad" style="cursor:pointer;">
          <h3>🌐 Apply to Universities Abroad</h3>
          <p>Match your grades and budget to top-ranked global universities.</p>
        </button>
      </div>
    </div>
  </section>

  <section id="bd" class="pipeline-panel">
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">National Track</span>
        <h2>Bangladesh University Pipeline</h2>
      </div>
      <div class="pipeline-flow" id="bdPipeline"></div>
    </div>
  </section>

  <section id="abroad" class="pipeline-panel" style="display:none;">
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">Global Track</span>
        <h2>Study Abroad Application Pipeline</h2>
      </div>
      <div class="pipeline-flow" id="abroadPipeline"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
