<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Information Hub — UniMatch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header" data-active="visa"></div>

<main>
  <section>
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">Visa information hub</span>
        <h2>Student visa criteria & processing parameters</h2>
      </div>
      <div class="visa-grid reveal" id="visaGrid"></div>
    </div>
  </section>

  <section>
    <div class="wrap">
      <div class="section-head reveal">
        <span class="eyebrow">Bank sponsor calculator</span>
        <h2>Solvency proof requirement matrix</h2>
      </div>
      <div class="panel-grid">
        <div>
          <div class="field-block">
            <select class="input-line" id="sponsorCountrySelect"></select>
          </div>
        </div>
        <div>
          <div class="result-panel" id="sponsorResult"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="main.js"></script>
<script src="visa.js"></script>
</body>
</html>
